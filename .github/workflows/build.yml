name: Build Windows x64

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TARGET_DIR: 'C:\t'
  VULKAN_SDK_VERSION: '1.4.341.1'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\1.4.341.1
          key: vulkan-sdk-1.4.341.1

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/${env:VULKAN_SDK_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_SDK_VERSION}.exe"
          $installer = "${env:RUNNER_TEMP}\vulkansdk.exe"
          Write-Host "Downloading Vulkan SDK from $url"
          Invoke-WebRequest -Uri $url -OutFile $installer -MaximumRetryCount 3
          Write-Host "Installing Vulkan SDK..."
          Start-Process -FilePath $installer -ArgumentList '/S' -Wait
          Write-Host "Vulkan SDK installed."

      - name: Set Vulkan environment
        shell: pwsh
        run: |
          $sdk = "C:\VulkanSDK\${env:VULKAN_SDK_VERSION}"
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          echo "$sdk\Bin" >> $env:GITHUB_PATH

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build release
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DL-Voice-Typing-windows-x64
          path: C:\t\release\bundle\nsis\*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: C:\t\release\bundle\nsis\*.exe
          generate_release_notes: true
