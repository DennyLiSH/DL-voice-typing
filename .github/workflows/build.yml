name: Build Windows x64

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TARGET_DIR: 'C:\t'
  CMAKE_GENERATOR: 'Ninja'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CI pins a specific version for reproducibility.
      # MSRV is 1.85 — see Cargo.toml rust-version.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88.0'
          components: 'rustfmt, clippy'

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.341.1
          cache: true

      - name: Verify Vulkan SDK
        shell: pwsh
        run: |
          Write-Host "VULKAN_SDK=$env:VULKAN_SDK"
          Write-Host "CMAKE_GENERATOR=$env:CMAKE_GENERATOR"
          if (Test-Path "$env:VULKAN_SDK") {
            Write-Host "SDK dir exists"
            if (Test-Path "$env:VULKAN_SDK\Lib\vulkan-1.lib") { Write-Host "OK vulkan-1.lib" } else { Write-Host "MISSING vulkan-1.lib" }
          } else { Write-Host "SDK dir MISSING" }
          ninja --version

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint (clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build release
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuwenbbit-windows-x64
          path: C:\t\release\bundle\nsis\*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: C:\t\release\bundle\nsis\*.exe
          generate_release_notes: true
