<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DL Voice Typing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .floating-bar {
            display: flex;
            align-items: center;
            height: 56px;
            min-width: 160px;
            max-width: 560px;
            padding: 0 16px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: scale(0.9) translateY(8px);
            transition: opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .floating-bar.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .floating-bar.exit {
            opacity: 0;
            transform: scale(0.95) translateY(0);
            transition: opacity 0.22s cubic-bezier(0.4, 0, 1, 1),
                        transform 0.22s cubic-bezier(0.4, 0, 1, 1);
        }

        .floating-bar.error {
            background: rgba(220, 38, 38, 0.15);
            border-color: rgba(220, 38, 38, 0.3);
        }

        /* Waveform */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 32px;
            gap: 4px;
            flex-shrink: 0;
        }

        .waveform .bar {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 2px;
            transition: height 0.08s ease-out;
        }

        /* Text */
        .text-content {
            margin-left: 12px;
            font-family: system-ui, "Segoe UI", sans-serif;
            font-size: 15px;
            line-height: 20px;
            color: #FFFFFF;
            max-width: 460px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: width 0.25s ease-out;
        }

        /* LLM refining dots */
        .refining-dots {
            margin-left: 12px;
            display: flex;
            gap: 4px;
        }

        .refining-dots .dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: dot-bounce 0.6s ease-in-out infinite;
        }

        .refining-dots .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .refining-dots .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            40% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* Error text */
        .error-text {
            color: rgba(220, 38, 38, 0.9);
        }
    </style>
</head>
<body>
    <div class="floating-bar" id="bar">
        <div class="waveform" id="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="text-content" id="text" aria-live="polite"></div>
        <div class="refining-dots" id="dots" style="display: none;">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script src="floating.js"></script>
</body>
</html>
