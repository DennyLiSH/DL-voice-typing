<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文兔</title>
    <link rel="stylesheet" href="common.css">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .indicator {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid transparent;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, opacity, background, box-shadow;
        }

        .indicator.visible {
            opacity: 1;
            transform: scale(1);
        }

        .indicator.exit {
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.22s cubic-bezier(0.4, 0, 1, 1),
                        transform 0.22s cubic-bezier(0.4, 0, 1, 1);
        }

        .indicator.processing {
            animation: breathe 1.5s ease-in-out infinite;
        }

        .indicator.error {
            background: rgba(220, 38, 38, 0.6) !important;
            border-color: rgba(220, 38, 38, 0.4);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes ripple-out {
            0%   { transform: scale(1);   opacity: 0.45; border-width: 2px; }
            100% { transform: scale(1.9); opacity: 0;    border-width: 0.5px; }
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 68px;
            height: 68px;
            margin-top: -34px;
            margin-left: -34px;
            border-radius: 50%;
            border: 2px solid rgba(58, 186, 180, 0.35);
            pointer-events: none;
            animation: ripple-out 700ms ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="indicator" id="indicator"></div>

    <script src="floating.js"></script>
</body>
</html>
