<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DL 语音输入 - 设置</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: rgba(26, 26, 26, 0.85);
            --border: #cccccc;
            --focus: #0078D4;
            --success: #16a34a;
            --error: #dc2626;
            --btn-secondary-bg: #e0e0e0;
            --btn-secondary-text: #6C6C6C;
            --section-accent: #0078D4;
            --progress-bg: #e0e0e0;
            --disabled-bg: #f5f5f5;
            --disabled-text: #999999;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --text: #e0e0e0;
                --text-secondary: rgba(224, 224, 224, 0.85);
                --border: #555555;
                --btn-secondary-bg: #333333;
                --btn-secondary-text: #aaaaaa;
                --section-accent: #4da3e8;
                --progress-bg: #444444;
                --disabled-bg: #2a2a2a;
                --disabled-text: #666666;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-width: 480px;
            min-height: 620px;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 0;
        }

        /* Section headers */
        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-weight: 600;
            font-size: 14px;
            border-left: 3px solid var(--section-accent);
            padding-left: 10px;
            margin-bottom: 16px;
            color: var(--text);
        }

        /* Form groups */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-secondary);
        }

        select, input[type="text"], input[type="password"] {
            width: 100%;
            height: 32px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        select:focus, input:focus {
            border-color: transparent;
            outline: 2px solid var(--focus);
        }

        select:disabled, input:disabled {
            background: var(--disabled-bg);
            color: var(--disabled-text);
            cursor: not-allowed;
        }

        /* Whisper model select + action row */
        .model-select-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .model-select-row select {
            flex: 1;
        }

        .model-status-downloaded {
            font-size: 13px;
            color: var(--success);
            white-space: nowrap;
        }

        .btn-download-model {
            height: 32px;
            padding: 0 14px;
            border: 1px solid var(--focus);
            border-radius: 4px;
            background: var(--focus);
            color: #ffffff;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-download-model:hover { opacity: 0.9; }

        .btn-download-model:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-cancel-download {
            background: none;
            border: none;
            color: var(--error);
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .btn-cancel-download:hover { text-decoration: underline; }

        /* Download progress */
        .download-progress {
            margin-top: 8px;
        }

        .progress-bar-track {
            height: 6px;
            border-radius: 3px;
            background: var(--progress-bg);
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--focus);
            transition: width 0.2s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* LLM toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .toggle-label { font-weight: 500; }

        .toggle-switch {
            width: 40px;
            height: 22px;
            background: var(--border);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .toggle-switch.active { background: var(--focus); }

        .toggle-switch::after {
            content: '';
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s ease;
        }

        .toggle-switch.active::after { transform: translateX(18px); }

        .llm-fields { transition: opacity 0.2s ease; }
        .llm-fields.disabled { opacity: 0.5; pointer-events: none; }

        /* Password toggle */
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 36px; }
        .toggle-password {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--btn-secondary-text);
        }

        /* Bottom bar */
        .bottom-bar {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            justify-content: flex-end;
        }

        button {
            height: 32px;
            padding: 0 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
            margin-right: 12px;
        }

        .btn-primary {
            background: var(--focus);
            color: #ffffff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Status messages */
        .status { font-size: 13px; min-height: 20px; }
        .status.success { color: var(--success); }
        .status.error { color: var(--error); }

        /* Error banner */
        .error-banner {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: var(--error);
            font-size: 13px;
        }

        /* Keyboard shortcut hint */
        .shortcut-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Path select row */
        .path-select-row {
            display: flex;
            gap: 8px;
        }
        .path-select-row input {
            flex: 1;
        }

        /* Focus styles */
        *:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 2px;
        }

        /* Compute mode badge */
        .mode-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }
        .mode-badge.gpu { background: rgba(22, 163, 74, 0.1); color: var(--success); }
        .mode-badge.cpu { background: rgba(234, 179, 8, 0.15); color: #ca8a04; }
        .mode-badge.unloaded { background: rgba(220, 38, 38, 0.1); color: var(--error); }
    </style>
</head>
<body>
    <div class="scroll-area">
        <!-- Error banner (hidden by default) -->
        <div class="error-banner" id="error-banner" style="display:none" role="alert"></div>

        <!-- Section 1: General Settings -->
        <div class="section" role="group" aria-labelledby="section-general">
            <div class="section-title" id="section-general">通用设置</div>
            <div class="form-group">
                <label for="language">识别语言</label>
                <select id="language" aria-label="识别语言">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
            </div>
            <div class="form-group">
                <label for="hotkey">快捷键</label>
                <select id="hotkey" aria-label="快捷键">
                    <option value="RightCtrl">Right Ctrl</option>
                    <option value="LeftCtrl">Left Ctrl</option>
                    <option value="RightAlt">Right Alt</option>
                    <option value="LeftAlt">Left Alt</option>
                    <option value="RightShift">Right Shift</option>
                    <option value="LeftShift">Left Shift</option>
                    <option value="F1">F1</option>
                    <option value="F2">F2</option>
                    <option value="F3">F3</option>
                    <option value="F4">F4</option>
                    <option value="F5">F5</option>
                    <option value="F6">F6</option>
                    <option value="F7">F7</option>
                    <option value="F8">F8</option>
                    <option value="F9">F9</option>
                    <option value="F10">F10</option>
                    <option value="F11">F11</option>
                    <option value="F12">F12</option>
                </select>
                <div class="shortcut-hint">按住说话，松开转写。切换需重启生效。</div>
            </div>
            <div class="toggle-row">
                <span class="toggle-label">粘贴前确认</span>
                <div class="toggle-switch" id="review-toggle" role="switch" aria-checked="false" aria-label="粘贴前确认" tabindex="0"></div>
            </div>
            <div class="shortcut-hint" style="margin-top: -8px; margin-bottom: 8px;">转写完成后弹出编辑窗口，确认后再粘贴</div>
        </div>
        <div class="section" role="group" aria-labelledby="section-whisper">
            <div class="section-title" id="section-whisper">Whisper 模型</div>
            <div class="form-group">
                <label for="whisper-model">模型选择</label>
                <div class="model-select-row">
                    <select id="whisper-model" aria-label="Whisper 模型选择">
                        <!-- Dynamically populated -->
                    </select>
                    <span class="model-status-downloaded" id="model-status-text" style="display:none">✓ 已下载</span>
                    <button class="btn-download-model" id="btn-download-model" style="display:none">下载</button>
                </div>
                <div class="download-progress" id="download-progress" style="display:none">
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progress-percent">0%</span>
                        <button class="btn-cancel-download" id="btn-cancel-download">取消</button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="download-mirror">下载源</label>
                <select id="download-mirror" aria-label="下载源">
                    <option value="hf-mirror">HF-Mirror (国内加速)</option>
                    <option value="huggingface">HuggingFace (国际)</option>
                </select>
                <div class="shortcut-hint">国内用户推荐使用 HF-Mirror 加速下载</div>
            </div>
            <div class="form-group" id="compute-mode-group">
                <label>运行模式</label>
                <span class="mode-badge unloaded" id="compute-mode-badge">检测中...</span>
            </div>
        </div>

        <!-- Section 3: LLM Correction -->
        <div class="section" role="group" aria-labelledby="section-llm">
            <div class="section-title" id="section-llm">LLM 纠错</div>
            <div class="toggle-row">
                <span class="toggle-label">启用 LLM 纠错</span>
                <div class="toggle-switch" id="llm-toggle" role="switch" aria-checked="false" aria-label="启用 LLM 纠错" tabindex="0"></div>
            </div>
            <div class="llm-fields disabled" id="llm-fields">
                <div class="form-group">
                    <label for="api-url">API 地址</label>
                    <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions" aria-label="API URL">
                </div>
                <div class="form-group">
                    <label for="api-key">API 密钥</label>
                    <div class="password-wrapper">
                        <input type="password" id="api-key" placeholder="sk-..." aria-label="API Key">
                        <button class="toggle-password" id="toggle-key" aria-label="显示/隐藏 API Key">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="model">模型名称</label>
                    <input type="text" id="model" placeholder="gpt-4o-mini" aria-label="Model name">
                </div>
                <div>
                    <button class="btn-secondary" id="test-btn">测试连接</button>
                    <span class="status" id="test-status"></span>
                </div>
            </div>
        </div>

        <!-- Section 4: Data Saving -->
        <div class="section" role="group" aria-labelledby="section-data-saving">
            <div class="section-title" id="section-data-saving">数据保存</div>
            <div class="toggle-row">
                <span class="toggle-label">保存训练数据</span>
                <div class="toggle-switch" id="data-saving-toggle" role="switch" aria-checked="false" aria-label="保存训练数据" tabindex="0"></div>
            </div>
            <div class="llm-fields disabled" id="data-saving-fields">
                <div class="form-group">
                    <label for="data-saving-path">保存路径</label>
                    <div class="path-select-row">
                        <input type="text" id="data-saving-path" placeholder="选择保存训练数据的文件夹" aria-label="数据保存路径">
                        <button class="btn-secondary" id="btn-browse-path" style="margin-right:0;white-space:nowrap">浏览</button>
                    </div>
                    <div class="shortcut-hint">录音结束后将保存音频(WAV)和转写文本(JSON)到该目录</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed bottom bar -->
    <div class="bottom-bar">
        <span class="status" id="save-status"></span>
        <button class="btn-primary" id="save-btn" disabled>保存</button>
    </div>

    <script src="settings.js"></script>
</body>
</html>
