<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文兔语音输入法 - 设置</title>
    <style>
        :root {
            --bg: #FAFAF8;
            --text: #1A1B1E;
            --text-secondary: rgba(26, 27, 30, 0.85);
            --border: #E0DDD8;
            --focus: #3ABAB4;
            --success: #16a34a;
            --error: #dc2626;
            --btn-secondary-bg: #F0EFED;
            --btn-secondary-text: rgba(26, 27, 30, 0.5);
            --progress-bg: #E0DDD8;
            --disabled-bg: #F5F4F2;
            --disabled-text: rgba(26, 27, 30, 0.35);
            --sidebar-bg: #F0EFED;
            --sidebar-icon: #888888;
            --sidebar-active-bg: rgba(58, 186, 180, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1A1B1E;
                --text: #E8E6E3;
                --text-secondary: rgba(232, 230, 227, 0.85);
                --border: #38393C;
                --btn-secondary-bg: rgba(255, 255, 255, 0.06);
                --btn-secondary-text: rgba(255, 255, 255, 0.5);
                --progress-bg: rgba(255, 255, 255, 0.06);
                --disabled-bg: rgba(255, 255, 255, 0.03);
                --disabled-text: rgba(255, 255, 255, 0.25);
                --sidebar-bg: #141517;
                --sidebar-icon: #777777;
                --sidebar-active-bg: rgba(58, 186, 180, 0.12);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-width: 560px;
            min-height: 620px;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Main layout: sidebar + content */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 48px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            border-right: 1px solid var(--border);
        }

        .sidebar-item {
            width: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s ease;
            position: relative;
            user-select: none;
        }

        .sidebar-item:hover {
            background: var(--sidebar-active-bg);
        }

        .sidebar-item.active {
            border-left-color: var(--focus);
            background: var(--sidebar-active-bg);
        }

        .sidebar-item svg {
            width: 20px;
            height: 20px;
            stroke: var(--sidebar-icon);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar-item.active svg {
            stroke: var(--focus);
        }

        .sidebar-item span {
            font-size: 9px;
            margin-top: 3px;
            color: var(--sidebar-icon);
            line-height: 1;
        }

        .sidebar-item.active span {
            color: var(--focus);
            font-weight: 600;
        }

        /* Content area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 0;
            display: none;
        }

        .page-content.active {
            display: block;
        }

        .page-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text);
        }

        /* Form groups */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-secondary);
        }

        select, input[type="text"], input[type="password"] {
            width: 100%;
            height: 32px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        select:focus, input:focus {
            border-color: transparent;
            outline: 2px solid var(--focus);
        }

        select:disabled, input:disabled {
            background: var(--disabled-bg);
            color: var(--disabled-text);
            cursor: not-allowed;
        }

        /* Whisper model select + action row */
        .model-select-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .model-select-row select {
            flex: 1;
        }

        .model-status-downloaded {
            font-size: 13px;
            color: var(--success);
            white-space: nowrap;
        }

        .btn-download-model {
            height: 32px;
            padding: 0 14px;
            border: 1px solid var(--focus);
            border-radius: 4px;
            background: var(--focus);
            color: #ffffff;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-download-model:hover { opacity: 0.9; }

        .btn-download-model:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-cancel-download {
            background: none;
            border: none;
            color: var(--error);
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .btn-cancel-download:hover { text-decoration: underline; }

        /* Download progress */
        .download-progress {
            margin-top: 8px;
        }

        .progress-bar-track {
            height: 6px;
            border-radius: 3px;
            background: var(--progress-bg);
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--focus);
            transition: width 0.2s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .toggle-label { font-weight: 500; }

        .toggle-switch {
            width: 40px;
            height: 22px;
            background: var(--border);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .toggle-switch.active { background: var(--focus); }

        .toggle-switch::after {
            content: '';
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s ease;
        }

        .toggle-switch.active::after { transform: translateX(18px); }

        .conditional-fields { transition: opacity 0.2s ease; }
        .conditional-fields.disabled { opacity: 0.5; pointer-events: none; }

        /* Password toggle */
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 36px; }
        .toggle-password {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--btn-secondary-text);
        }

        /* Bottom bar */
        .bottom-bar {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        button {
            height: 32px;
            padding: 0 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }

        .btn-primary {
            background: var(--focus);
            color: #ffffff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Status messages */
        .status { font-size: 13px; min-height: 20px; }
        .status.success { color: var(--success); }
        .status.error { color: var(--error); }

        /* Error banner */
        .error-banner {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: var(--error);
            font-size: 13px;
        }

        /* Hint text */
        .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Path select row */
        .path-select-row {
            display: flex;
            gap: 8px;
        }
        .path-select-row input {
            flex: 1;
        }

        /* Focus styles */
        *:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 2px;
        }

        /* Compute mode badge */
        .mode-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }
        .mode-badge.gpu { background: rgba(22, 163, 74, 0.1); color: var(--success); }
        .mode-badge.cpu { background: rgba(234, 179, 8, 0.15); color: #ca8a04; }
        .mode-badge.unloaded { background: rgba(220, 38, 38, 0.1); color: var(--error); }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Sidebar navigation -->
        <nav class="sidebar" role="tablist" aria-label="设置导航">
            <div class="sidebar-item active" data-page="general" role="tab" aria-selected="true" tabindex="0">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>通用</span>
            </div>
            <div class="sidebar-item" data-page="hotkey" role="tab" aria-selected="false" tabindex="-1">
                <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M8 16h8"/></svg>
                <span>快捷键</span>
            </div>
            <div class="sidebar-item" data-page="model" role="tab" aria-selected="false" tabindex="-1">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                <span>模型</span>
            </div>
            <div class="sidebar-item" data-page="llm" role="tab" aria-selected="false" tabindex="-1">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>LLM</span>
            </div>
            <div class="sidebar-item" data-page="data" role="tab" aria-selected="false" tabindex="-1">
                <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                <span>数据</span>
            </div>
        </nav>

        <!-- Content area -->
        <div class="content-area">
            <!-- Error banner -->
            <div class="error-banner" id="error-banner" style="display:none" role="alert"></div>

            <!-- Page: General -->
            <div class="page-content active" id="page-general" role="tabpanel">
                <div class="page-title">通用设置</div>
                <div class="form-group">
                    <label for="language">识别语言</label>
                    <select id="language" aria-label="识别语言">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">开机自动启动</span>
                    <div class="toggle-switch" id="autostart-toggle" role="switch" aria-checked="false" aria-label="开机自动启动" tabindex="0"></div>
                </div>
            </div>

            <!-- Page: Hotkey -->
            <div class="page-content" id="page-hotkey" role="tabpanel">
                <div class="page-title">快捷键</div>
                <div class="form-group">
                    <label for="hotkey">语音输入快捷键</label>
                    <select id="hotkey" aria-label="快捷键">
                        <option value="RightCtrl">Right Ctrl</option>
                        <option value="LeftCtrl">Left Ctrl</option>
                        <option value="RightAlt">Right Alt</option>
                        <option value="LeftAlt">Left Alt</option>
                        <option value="RightShift">Right Shift</option>
                        <option value="LeftShift">Left Shift</option>
                        <option value="F1">F1</option>
                        <option value="F2">F2</option>
                        <option value="F3">F3</option>
                        <option value="F4">F4</option>
                        <option value="F5">F5</option>
                        <option value="F6">F6</option>
                        <option value="F7">F7</option>
                        <option value="F8">F8</option>
                        <option value="F9">F9</option>
                        <option value="F10">F10</option>
                        <option value="F11">F11</option>
                        <option value="F12">F12</option>
                    </select>
                    <div class="hint">按住说话，松开转写。切换需重启生效。</div>
                </div>
            </div>

            <!-- Page: Model -->
            <div class="page-content" id="page-model" role="tabpanel">
                <div class="page-title">Whisper 模型</div>
                <div class="form-group">
                    <label for="whisper-model">模型选择</label>
                    <div class="model-select-row">
                        <select id="whisper-model" aria-label="Whisper 模型选择">
                            <!-- Dynamically populated -->
                        </select>
                        <span class="model-status-downloaded" id="model-status-text" style="display:none">✓ 已下载</span>
                        <button class="btn-download-model" id="btn-download-model" style="display:none">下载</button>
                    </div>
                    <div class="download-progress" id="download-progress" style="display:none">
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
                        </div>
                        <div class="progress-info">
                            <span id="progress-percent">0%</span>
                            <button class="btn-cancel-download" id="btn-cancel-download">取消</button>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="download-mirror">下载源</label>
                    <select id="download-mirror" aria-label="下载源">
                        <option value="hf-mirror">HF-Mirror (国内加速)</option>
                        <option value="huggingface">HuggingFace (国际)</option>
                    </select>
                    <div class="hint">国内用户推荐使用 HF-Mirror 加速下载</div>
                </div>
                <div class="form-group" id="compute-mode-group">
                    <label>运行模式</label>
                    <span class="mode-badge unloaded" id="compute-mode-badge">检测中...</span>
                </div>
            </div>

            <!-- Page: LLM -->
            <div class="page-content" id="page-llm" role="tabpanel">
                <div class="page-title">LLM 纠错</div>
                <div class="toggle-row">
                    <span class="toggle-label">启用 LLM 纠错</span>
                    <div class="toggle-switch" id="llm-toggle" role="switch" aria-checked="false" aria-label="启用 LLM 纠错" tabindex="0"></div>
                </div>
                <div class="conditional-fields disabled" id="llm-fields">
                    <div class="form-group">
                        <label for="api-url">API 地址</label>
                        <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions" aria-label="API URL">
                    </div>
                    <div class="form-group">
                        <label for="api-key">API 密钥</label>
                        <div class="password-wrapper">
                            <input type="password" id="api-key" placeholder="sk-..." aria-label="API Key">
                            <button class="toggle-password" id="toggle-key" aria-label="显示/隐藏 API Key">👁</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="model">模型名称</label>
                        <input type="text" id="model" placeholder="gpt-4o-mini" aria-label="Model name">
                    </div>
                    <div>
                        <button class="btn-secondary" id="test-btn">测试连接</button>
                        <span class="status" id="test-status"></span>
                    </div>
                </div>
            </div>

            <!-- Page: Data -->
            <div class="page-content" id="page-data" role="tabpanel">
                <div class="page-title">数据保存</div>
                <div class="toggle-row">
                    <span class="toggle-label">保存训练数据</span>
                    <div class="toggle-switch" id="data-saving-toggle" role="switch" aria-checked="false" aria-label="保存训练数据" tabindex="0"></div>
                </div>
                <div class="conditional-fields disabled" id="data-saving-fields">
                    <div class="form-group">
                        <label for="data-saving-path">保存路径</label>
                        <div class="path-select-row">
                            <input type="text" id="data-saving-path" placeholder="选择保存训练数据的文件夹" aria-label="数据保存路径">
                            <button class="btn-secondary" id="btn-browse-path" style="white-space:nowrap">浏览</button>
                        </div>
                        <div class="hint">录音结束后将保存音频(WAV)和转写文本(JSON)到该目录</div>
                    </div>
                </div>
                <div class="toggle-row" style="margin-top: 16px;">
                    <span class="toggle-label">粘贴前确认</span>
                    <div class="toggle-switch" id="review-toggle" role="switch" aria-checked="false" aria-label="粘贴前确认" tabindex="0"></div>
                </div>
                <div class="hint" style="margin-top: -8px;">转写完成后弹出编辑窗口，确认后再粘贴</div>
            </div>
        </div>
    </div>

    <!-- Fixed bottom bar -->
    <div class="bottom-bar">
        <span class="status" id="save-status"></span>
        <button class="btn-primary" id="save-btn" disabled>保存</button>
    </div>

    <script src="settings.js"></script>
</body>
</html>
