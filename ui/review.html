<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="review.css">
</head>
<body>
    <div class="container" id="container">
        <div class="preview" id="preview"></div>
        <textarea
            id="review-text"
            role="textbox"
            aria-label="转写结果"
            aria-multiline="true"
            spellcheck="false"
        ></textarea>
        <div class="error-msg" id="error-msg"></div>
        <div class="button-row">
            <button class="btn-cancel" id="btn-cancel" role="button" aria-label="取消">取消</button>
            <button class="btn-confirm" id="btn-confirm" role="button" aria-label="确认粘贴">确认粘贴</button>
        </div>
    </div>

    <script src="review.js?v=7"></script>
</body>
</html>
