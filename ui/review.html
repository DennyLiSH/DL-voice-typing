<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            overflow: hidden;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 16px;
            opacity: 0;
            transition: opacity 60ms ease-out;
        }

        .container.visible {
            opacity: 1;
        }

        textarea {
            flex: 1;
            min-height: 80px;
            max-height: calc(100% - 50px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            padding: 12px;
            color: rgba(255, 255, 255, 0.92);
            font-size: 14px;
            font-family: inherit;
            line-height: 1.5;
            resize: none;
            outline: none;
            overflow-y: auto;
        }

        textarea:focus {
            border-color: rgba(0, 190, 210, 0.5);
        }

        .button-row {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        button {
            height: 32px;
            padding: 0 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .btn-confirm {
            background: rgba(0, 190, 210, 0.85);
            color: #fff;
            padding: 6px 20px;
        }

        .btn-confirm:hover {
            background: rgba(0, 210, 230, 0.95);
        }

        .btn-cancel {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* Focus indicators */
        textarea:focus-visible,
        button:focus-visible {
            outline: 2px solid rgba(0, 190, 210, 0.8);
            outline-offset: 2px;
        }

        /* High contrast mode */
        @media (forced-colors: active) {
            textarea {
                border: 1px solid ButtonText;
            }
            button {
                border: 1px solid ButtonText;
            }
        }

        /* Error message */
        .error-msg {
            color: rgba(220, 38, 38, 0.9);
            font-size: 12px;
            margin-top: 4px;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <textarea
            id="review-text"
            role="textbox"
            aria-label="转写结果"
            aria-multiline="true"
            spellcheck="false"
        ></textarea>
        <div class="error-msg" id="error-msg"></div>
        <div class="button-row">
            <button class="btn-cancel" id="btn-cancel" role="button" aria-label="取消">取消</button>
            <button class="btn-confirm" id="btn-confirm" role="button" aria-label="确认粘贴">确认粘贴</button>
        </div>
    </div>

    <script src="review.js"></script>
</body>
</html>
